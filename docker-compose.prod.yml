services:
  focus-task-api:
    image: ${FOCUS_TASK_API_IMAGE:?Set FOCUS_TASK_API_IMAGE in .env, e.g. ghcr.io/vipuncle2026/focus-task/focus-task-api:latest}
    container_name: focus-task-api
    environment:
      FOCUS_TASK_BACKEND_HOST: "0.0.0.0"
      FOCUS_TASK_BACKEND_PORT: 8765
      FOCUS_TASK_DATABASE_URL: sqlite:////data/todo.db
      FOCUS_TASK_SECRET_KEY: ${FOCUS_TASK_SECRET_KEY:?set FOCUS_TASK_SECRET_KEY in .env}
      FOCUS_TASK_TOKEN_EXPIRE_MINUTES: ${FOCUS_TASK_TOKEN_EXPIRE_MINUTES:-10080}
      FOCUS_TASK_PASSWORD_MIN_LENGTH: ${FOCUS_TASK_PASSWORD_MIN_LENGTH:-8}
      FOCUS_TASK_BOOTSTRAP_ADMIN_USERNAME: ${FOCUS_TASK_BOOTSTRAP_ADMIN_USERNAME:-admin}
      FOCUS_TASK_BOOTSTRAP_ADMIN_PASSWORD: ${FOCUS_TASK_BOOTSTRAP_ADMIN_PASSWORD:-admin123}
      FOCUS_TASK_CORS_ORIGINS: ${FOCUS_TASK_CORS_ORIGINS:-}
    ports:
      - "${FOCUS_TASK_API_PORT:-8765}:8765"
    volumes:
      - focus-task-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8765/api/health', timeout=5)\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  focus-task-web:
    image: ${FOCUS_TASK_WEB_IMAGE:?Set FOCUS_TASK_WEB_IMAGE in .env, e.g. ghcr.io/vipuncle2026/focus-task/focus-task-web:latest}
    container_name: focus-task-web
    depends_on:
      focus-task-api:
        condition: service_healthy
    ports:
      - "${FOCUS_TASK_WEB_PORT:-8380}:80"
    restart: unless-stopped

volumes:
  focus-task-data:
